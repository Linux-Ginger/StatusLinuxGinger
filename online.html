<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status - Linux Ginger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #6b6b5a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: #4a4a3a;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    nav img { width: 90px; height: 90px; border-radius: 8px; object-fit: cover; }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .card {
      background: #4a4a3a;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      border-top: 4px solid #27ae60;
    }
    .icon {
      width: 48px; height: 48px; background: #27ae60; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;
    }
    .icon svg { width: 24px; height: 24px; fill: white; }
    h1 { color: white; font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .divider { width: 50px; height: 3px; background: #27ae60; margin: 1rem auto; border-radius: 2px; }
    p { color: #ccc; line-height: 1.7; font-size: 0.95rem; }
    footer {
      background: #1a1a1a;
      color: #aaa;
      padding: 1rem 2rem;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
    }
    footer img { width: 90px; height: 90px; border-radius: 8px; flex-shrink: 0; }
    footer span { flex: 1; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <img src="Logo.png" alt="Linux Ginger">
  </nav>
  <div class="main">
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      </div>
      <h1>All Systems Operational</h1>
      <div class="divider"></div>
      <p>All services are running normally.<br>No issues have been detected.</p>
    </div>
  </div>
  <footer>
    <img src="Logo.png" alt="Linux Ginger">
    <span>Copyright © 2024 - <span id="year"></span> Linux Ginger | Linux Tutorials. All rights reserved.</span>
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
