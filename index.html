<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status - Linux Ginger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e8e0d0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 2rem;
    }
    .card {
      background: #f5f0e8;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      border-top: 4px solid #c0392b;
    }
    .logo { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 1.5rem; }
    .brand { font-size: 1.1rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.25rem; }
    .divider { width: 40px; height: 3px; background: #c0392b; margin: 1rem auto; border-radius: 2px; }
    h1 { font-size: 1.6rem; color: #c0392b; margin-bottom: 0.75rem; font-weight: 700; }
    p { color: #444; line-height: 1.7; font-size: 0.95rem; }
    .icon { font-size: 2rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="Logo.png">
    <div class="brand">Linux Ginger</div>
    <div class="divider"></div>
    <div class="icon">⚠️</div>
    <h1>Technische Storing</h1>
    <p>We ervaren momenteel een technische storing.<br>
    We zijn hier mee bezig en lossen dit zo snel mogelijk op.</p>
  </div>
</body>
</html>
