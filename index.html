<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status - Linux Ginger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #6b6b5a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: #4a4a3a;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    nav img { width: 90px; height: 90px; border-radius: 8px; object-fit: cover; }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .card {
      background: #4a4a3a;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      border-top: 4px solid #888;
    }
    .card.technical { border-top-color: #c0392b; }
    .card.maintenance { border-top-color: #e67e22; }
    .card.online { border-top-color: #27ae60; }
    .card.loading { border-top-color: #888; }
    .icon {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .card.technical .icon { background: #c0392b; }
    .card.maintenance .icon { background: #e67e22; }
    .card.online .icon { background: #27ae60; }
    .icon svg { width: 24px; height: 24px; fill: white; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #555;
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { color: white; font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .divider {
      width: 50px; height: 3px; background: #888;
      margin: 1rem auto; border-radius: 2px;
    }
    .card.technical .divider { background: #c0392b; }
    .card.maintenance .divider { background: #e67e22; }
    .card.online .divider { background: #27ae60; }
    p { color: #ccc; line-height: 1.7; font-size: 0.95rem; }
    .timer {
      margin-top: 1.5rem;
      color: #888;
      font-size: 0.85rem;
    }
    .timer span { color: #ccc; font-weight: 500; }
    .visit-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: #27ae60;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .visit-btn:hover { background: #219a52; }
    footer {
      background: #1a1a1a;
      color: #aaa;
      padding: 1rem 2rem;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
    }
    footer img { width: 90px; height: 90px; border-radius: 8px; flex-shrink: 0; }
    footer span { flex: 1; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <img src="Logo.png" alt="Linux Ginger">
  </nav>
  <div class="main">
    <div class="card loading" id="card">
      <div class="spinner" id="iconwrap"></div>
      <h1 id="title">Retrieving data from server</h1>
      <div class="divider"></div>
      <p id="desc">Please wait</p>
      <div class="timer" id="timer"></div>
    </div>
  </div>
  <footer>
    <img src="Logo.png" alt="Linux Ginger">
    <span>Copyright © 2024 - <span id="year"></span> Linux Ginger | Linux Tutorials. All rights reserved.</span>
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const RESOLVED_KEY = 'lg_resolved_time';
    const ONE_HOUR = 60 * 60 * 1000;

    const states = {
      online: {
        class: 'online',
        title: 'All Systems Operational',
        desc: 'All services are running normally.<br>No issues have been detected.',
        icon: 'M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z',
        showTimer: false,
        showVisit: true
      },
      technical: {
        class: 'technical',
        title: 'Technical Issue',
        desc: 'We are currently experiencing a technical issue.<br>We are working on it and will resolve this as soon as possible.',
        icon: 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z',
        showTimer: true,
        showVisit: false
      },
      maintenance: {
        class: 'maintenance',
        title: 'Server Maintenance',
        desc: 'The server is currently offline for scheduled maintenance.<br>We will be back online as soon as possible.',
        icon: 'M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z',
        showTimer: true,
        showVisit: false
      }
    };

    let timerInterval = null;
    let currentStatus = null;
    let isLoading = false;
    let wasDown = false;

    function showLoader() {
      const card = document.getElementById('card');
      card.className = 'card loading';
      document.getElementById('iconwrap').className = 'spinner';
      document.getElementById('iconwrap').innerHTML = '';
      document.getElementById('title').textContent = 'Retrieving data from server';
      document.getElementById('desc').innerHTML = 'Please wait';
      document.getElementById('timer').innerHTML = '';
      if (timerInterval) clearInterval(timerInterval);
    }

    function startTimer(seconds) {
      if (timerInterval) clearInterval(timerInterval);
      let remaining = seconds;
      const timerEl = document.getElementById('timer');

      function updateTimer() {
        const mins = Math.floor(remaining / 60);
        const secs = remaining % 60;
        timerEl.innerHTML = `Checking again in <span>${mins}:${secs.toString().padStart(2, '0')}</span>`;
        if (remaining <= 0) {
          clearInterval(timerInterval);
          currentStatus = null;
          loadStatus();
        }
        remaining--;
      }
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    function getOnlineDesc() {
      const resolvedTime = localStorage.getItem(RESOLVED_KEY);
      if (resolvedTime) {
        const elapsed = Date.now() - parseInt(resolvedTime);
        if (elapsed < ONE_HOUR) {
          return 'The issues have been resolved. Thank you for your patience.';
        } else {
          localStorage.removeItem(RESOLVED_KEY);
        }
      }
      return 'All services are running normally.<br>No issues have been detected.';
    }

    function showStatus(state, statusKey) {
      const card = document.getElementById('card');
      card.className = 'card ' + state.class;
      document.getElementById('title').textContent = state.title;
      document.getElementById('iconwrap').className = 'icon';
      document.getElementById('iconwrap').innerHTML = `<svg viewBox="0 0 24 24"><path d="${state.icon}" fill="white"/></svg>`;

      if (statusKey === 'online') {
        document.getElementById('desc').innerHTML = getOnlineDesc();
      } else {
        document.getElementById('desc').innerHTML = state.desc;
      }

      if (state.showTimer) {
        startTimer(70);
        document.getElementById('timer').innerHTML = '';
      } else {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timer').innerHTML = '';
      }

      if (state.showVisit) {
        document.getElementById('timer').innerHTML = '<a href="https://linuxginger.com" class="visit-btn">Visit Linux Ginger →</a>';
      }
    }

    async function loadStatus() {
      if (isLoading) return;
      isLoading = true;
      showLoader();
      const startTime = Date.now();
      try {
        const resp = await fetch('/status.json?t=' + Date.now());
        const data = await resp.json();
        const state = states[data.status] || states.online;
        const elapsed = Date.now() - startTime;
        if (elapsed < 500) {
          await new Promise(r => setTimeout(r, 500 - elapsed));
        }

        if (data.status === 'online' && wasDown) {
          localStorage.setItem(RESOLVED_KEY, Date.now().toString());
          wasDown = false;
        }

        if (data.status !== 'online') {
          wasDown = true;
        }

        currentStatus = data.status;
        showStatus(state, data.status);
      } catch(e) {
        const elapsed = Date.now() - startTime;
        if (elapsed < 500) {
          await new Promise(r => setTimeout(r, 500 - elapsed));
        }
        currentStatus = 'online';
        showStatus(states.online, 'online');
      }
      isLoading = false;
    }

    loadStatus();
  </script>
</body>
</html>
